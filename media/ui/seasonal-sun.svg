<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- straight rays -->
  <rect x="14" y="1" width="4" height="2" fill="#d98a26"/>
  <rect x="15" y="1" width="2" height="2" fill="#f4c25b"/>
  <rect x="14" y="29" width="4" height="2" fill="#d98a26"/>
  <rect x="15" y="29" width="2" height="2" fill="#f4c25b"/>
  <rect x="1" y="14" width="2" height="4" fill="#d98a26"/>
  <rect x="1" y="15" width="2" height="2" fill="#f4c25b"/>
  <rect x="29" y="14" width="2" height="4" fill="#d98a26"/>
  <rect x="29" y="15" width="2" height="2" fill="#f4c25b"/>
  <!-- diagonal rays -->
  <rect x="5" y="5" width="3" height="3" fill="#d98a26"/>
  <rect x="6" y="6" width="2" height="2" fill="#f4c25b"/>
  <rect x="24" y="5" width="3" height="3" fill="#d98a26"/>
  <rect x="24" y="6" width="2" height="2" fill="#f4c25b"/>
  <rect x="5" y="24" width="3" height="3" fill="#d98a26"/>
  <rect x="6" y="24" width="2" height="2" fill="#f4c25b"/>
  <rect x="24" y="24" width="3" height="3" fill="#d98a26"/>
  <rect x="24" y="24" width="2" height="2" fill="#f4c25b"/>
  <!-- sun body outline (cross shape so it looks rounded) -->
  <rect x="10" y="11" width="12" height="10" fill="#a85e10"/>
  <rect x="11" y="10" width="10" height="12" fill="#a85e10"/>
  <!-- sun fill mid -->
  <rect x="11" y="11" width="10" height="10" fill="#f3b94a"/>
  <rect x="12" y="11" width="8" height="10" fill="#fcd674"/>
  <rect x="11" y="12" width="10" height="8" fill="#fcd674"/>
  <!-- sun fill light core -->
  <rect x="12" y="12" width="8" height="8" fill="#fde29a"/>
  <!-- top-left highlight -->
  <rect x="13" y="12" width="2" height="1" fill="#fff3c2"/>
  <rect x="12" y="13" width="1" height="2" fill="#fff3c2"/>
  <!-- bottom-right shadow -->
  <rect x="17" y="19" width="2" height="1" fill="#d99936"/>
  <rect x="19" y="17" width="1" height="2" fill="#d99936"/>
  <!-- eyes -->
  <rect x="13" y="14" width="1" height="2" fill="#4d2f0f"/>
  <rect x="18" y="14" width="1" height="2" fill="#4d2f0f"/>
  <!-- cheeks -->
  <rect x="12" y="16" width="1" height="1" fill="#f1948a"/>
  <rect x="19" y="16" width="1" height="1" fill="#f1948a"/>
  <!-- mouth (small smile) -->
  <rect x="14" y="17" width="4" height="1" fill="#aa6212"/>
  <rect x="15" y="18" width="2" height="1" fill="#aa6212"/>
</svg>
