<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- warm cream base -->
  <rect width="16" height="16" fill="#f6ecd5"/>

  <!-- subtle paper grain (off-white speckle) -->
  <rect x="2"  y="3"  width="1" height="1" fill="#eee2c4"/>
  <rect x="11" y="2"  width="1" height="1" fill="#eee2c4"/>
  <rect x="6"  y="13" width="1" height="1" fill="#eee2c4"/>
  <rect x="14" y="11" width="1" height="1" fill="#eee2c4"/>
  <rect x="3"  y="9"  width="1" height="1" fill="#eee2c4"/>
  <rect x="13" y="7"  width="1" height="1" fill="#eee2c4"/>

  <!-- tiny daisy at center: 4 amber petals + warm-tan core -->
  <rect x="7" y="5" width="2" height="2" fill="#e8c489"/>   <!-- top petal -->
  <rect x="7" y="9" width="2" height="2" fill="#e8c489"/>   <!-- bottom petal -->
  <rect x="5" y="7" width="2" height="2" fill="#e8c489"/>   <!-- left petal -->
  <rect x="9" y="7" width="2" height="2" fill="#e8c489"/>   <!-- right petal -->
  <rect x="7" y="7" width="2" height="2" fill="#c2864a"/>   <!-- center -->

  <!-- two tiny sage leaf dots flanking the daisy -->
  <rect x="6"  y="11" width="1" height="1" fill="#aebd8e"/>
  <rect x="9"  y="11" width="1" height="1" fill="#aebd8e"/>
  <rect x="10" y="4"  width="1" height="1" fill="#aebd8e"/>
  <rect x="5"  y="4"  width="1" height="1" fill="#aebd8e"/>
</svg>
