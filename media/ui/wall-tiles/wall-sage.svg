<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- soft sage paint base -->
  <rect width="16" height="16" fill="#a3b87f"/>

  <!-- darker stipple (paint texture) -->
  <rect x="3"  y="2"  width="1" height="1" fill="#94aa72"/>
  <rect x="11" y="4"  width="1" height="1" fill="#94aa72"/>
  <rect x="7"  y="9"  width="1" height="1" fill="#94aa72"/>
  <rect x="2"  y="13" width="1" height="1" fill="#94aa72"/>
  <rect x="13" y="11" width="1" height="1" fill="#94aa72"/>
  <rect x="8"  y="14" width="1" height="1" fill="#94aa72"/>

  <!-- lighter stipple (caught light) -->
  <rect x="5"  y="6"  width="1" height="1" fill="#b4c894"/>
  <rect x="9"  y="2"  width="1" height="1" fill="#b4c894"/>
  <rect x="14" y="7"  width="1" height="1" fill="#b4c894"/>
  <rect x="4"  y="11" width="1" height="1" fill="#b4c894"/>
  <rect x="0"  y="5"  width="1" height="1" fill="#b4c894"/>
</svg>
