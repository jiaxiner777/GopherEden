<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- dashed pixel-art outer frame -->
  <rect x="0" y="0" width="3" height="1" fill="#7a5a35"/>
  <rect x="6" y="0" width="4" height="1" fill="#7a5a35"/>
  <rect x="13" y="0" width="3" height="1" fill="#7a5a35"/>
  <rect x="0" y="15" width="3" height="1" fill="#7a5a35"/>
  <rect x="6" y="15" width="4" height="1" fill="#7a5a35"/>
  <rect x="13" y="15" width="3" height="1" fill="#7a5a35"/>
  <rect x="0" y="0" width="1" height="3" fill="#7a5a35"/>
  <rect x="0" y="6" width="1" height="4" fill="#7a5a35"/>
  <rect x="0" y="13" width="1" height="3" fill="#7a5a35"/>
  <rect x="15" y="0" width="1" height="3" fill="#7a5a35"/>
  <rect x="15" y="6" width="1" height="4" fill="#7a5a35"/>
  <rect x="15" y="13" width="1" height="3" fill="#7a5a35"/>
  <!-- gradient layers toward center -->
  <rect x="2" y="2" width="12" height="12" fill="#cdb78a"/>
  <rect x="3" y="3" width="10" height="10" fill="#decf9f"/>
  <rect x="4" y="4" width="8" height="8" fill="#ecddb4"/>
  <rect x="5" y="5" width="6" height="6" fill="#f7eccb"/>
  <rect x="6" y="6" width="4" height="4" fill="#fef6dc"/>
  <!-- corner accents -->
  <rect x="2" y="2" width="1" height="1" fill="#a88a5a"/>
  <rect x="13" y="2" width="1" height="1" fill="#a88a5a"/>
  <rect x="2" y="13" width="1" height="1" fill="#a88a5a"/>
  <rect x="13" y="13" width="1" height="1" fill="#a88a5a"/>
  <!-- tiny center crosshair to imply overlay/alignment mark -->
  <rect x="7" y="7" width="2" height="2" fill="#cdb78a"/>
  <rect x="7" y="6" width="2" height="1" fill="#fef6dc"/>
  <rect x="7" y="9" width="2" height="1" fill="#fef6dc"/>
  <rect x="6" y="7" width="1" height="2" fill="#fef6dc"/>
  <rect x="9" y="7" width="1" height="2" fill="#fef6dc"/>
</svg>
